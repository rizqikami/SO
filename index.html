<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Stok Opname Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; }
        #reader { width: 100%; max-width: 500px; margin: auto; }
        table { width: 100%; max-width: 500px; margin: 20px auto; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
    <h3>Stok Opname</h3>
    <div id="reader"></div>
    <div id="result" style="font-weight: bold; margin: 15px;">Arahkan kamera ke barcode...</div>
    
    <div class="controls">
        <button id="flash-btn">Toggle Flash</button>
        <button onclick="exportCSV()">Ekspor CSV</button>
        <button onclick="resetData()" style="color: red;">Reset</button>
    </div>

    <table>
        <thead><tr><th>Nama Barang</th><th>Qty</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
