<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Opname AFJ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 10px; background-color: #E0F7FA; padding-bottom: 150px; }
        #reader { width: 100%; max-width: 500px; margin: auto; display: none; }
        #petugas-info { font-weight: bold; margin: 10px; color: #006064; }
        table { 
            width: 100%; max-width: 500px; margin: 20px auto; 
            border-collapse: collapse; background: white; 
            display: block; max-height: 300px; overflow-y: auto; 
        }
        thead { position: sticky; top: 0; background: #B3E5FC; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .controls { margin-top: 10px; }
        button { padding: 8px 12px; margin: 3px; cursor: pointer; }
        
        #manual-input-area { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #B3E5FC; padding: 10px; box-sizing: border-box; z-index: 1000;
        }
        #search-results { background: white; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 5px; max-height: 150px; overflow-y: auto; }
        #search-results button { display: block; width: 100%; padding: 10px; border: none; border-bottom: 1px solid #eee; background: white; text-align: left; }
    </style>
</head>
<body>
    <h3>Program Stok Opnam AFJ</h3>
    <div id="petugas-info">Petugas: -</div>
    
    <div class="controls">
        <button id="toggle-camera-btn" onclick="toggleKamera()">Aktifkan Kamera</button>
        <button id="flash-btn">Toggle Flash</button>
        <button onclick="exportCSV()">Ekspor CSV</button>
        <button onclick="resetData()" style="color: white; background-color: red;">Reset</button>
    </div>

    <div id="reader"></div>
    <div id="result" style="margin: 15px; font-weight: bold; color: #006064;">Arahkan kamera...</div>

    <table>
        <thead><tr><th>Nama Barang | Kode | Waktu</th><th>Qty</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <div id="manual-input-area">
        <div id="search-results"></div>
        <input type="text" id="manual-search" placeholder="Cari nama barang manual..." onkeyup="cariBarang(this.value)" style="width: 90%; padding: 8px;">
    </div>

    <script src="script.js"></script>
</body>
</html>
